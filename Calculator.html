<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            margin: 0;
            padding: 40px;
        }

        .calculator {
            width: 360px;
            margin: auto;
            background-color: white;
            border: 1px solid #d5dde8;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #1f2937;
        }

        .input-box {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bcc7d5;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .calculation-box {
            border: 1px solid #d5dde8;
            border-radius: 8px;
            padding: 16px;
            background-color: #fbfcfe;
            margin-bottom: 18px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: white;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .result-box {
            min-height: 54px;
            border: 1px solid #bcc7d5;
            border-radius: 8px;
            padding: 14px;
            font-size: 18px;
            background-color: #f8fafc;
            color: #111827;
            box-sizing: border-box;
        }

        .error {
            color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>Calculator</h2>

        <div class="input-box">
            <input type="text" id="num1" placeholder="First number">
            <input type="text" id="num2" placeholder="Second number">
        </div>

        <div class="calculation-box">
            <div class="buttons">
                <button type="button" onclick="calculate('+')">+</button>
                <button type="button" onclick="calculate('-')">-</button>
                <button type="button" onclick="calculate('*')">*</button>
                <button type="button" onclick="calculate('/')">/</button>
                <button type="button" onclick="calculate('%')">%</button>
                <button type="button" onclick="clearCalculator()">Clear</button>
            </div>
        </div>

        <div class="result-box" id="result">Result will appear here</div>
    </div>

    <script>
        function calculate(operator) {
            let firstValue = document.getElementById("num1").value.trim();
            let secondValue = document.getElementById("num2").value.trim();
            let resultBox = document.getElementById("result");

            let firstNumber = parseFloat(firstValue);
            let secondNumber = parseFloat(secondValue);

            if (firstValue === "" || secondValue === "") {
                showError("Please enter both numbers");
                return;
            }

            if (isNaN(firstNumber) || isNaN(secondNumber)) {
                showError("Please enter valid numbers only");
                return;
            }

            let answer;
            let symbol = operator;

            if (operator === "+") {
                answer = firstNumber + secondNumber;
            } else if (operator === "-") {
                answer = firstNumber - secondNumber;
            } else if (operator === "*") {
                answer = firstNumber * secondNumber;
                symbol = "x";
            } else if (operator === "/") {
                if (secondNumber === 0) {
                    showError("Cannot divide by zero");
                    return;
                }
                answer = firstNumber / secondNumber;
            } else if (operator === "%") {
                if (secondNumber === 0) {
                    showError("Cannot calculate modulus by zero");
                    return;
                }
                answer = firstNumber % secondNumber;
            }

            resultBox.className = "result-box";
            resultBox.innerHTML = firstNumber + " " + symbol + " " + secondNumber + " = " + answer;
        }

        function showError(message) {
            let resultBox = document.getElementById("result");
            resultBox.className = "result-box error";
            resultBox.innerHTML = message;
        }

        function clearCalculator() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("result").className = "result-box";
            document.getElementById("result").innerHTML = "Result will appear here";
        }
    </script>

</body>
</html>
