<div class="address-section">

    <h3>Permanent Address</h3>

    <div class="address-grid">
        <input type="text" id="pAddress" placeholder="Address Line">
        <input type="text" id="pCity" placeholder="City">
        <input type="text" id="pState" placeholder="State">
    </div>

    <label class="checkbox">
        <input type="checkbox" id="sameAddress" onchange="copyAddress()">
        Same as Permanent Address
    </label>

    <h3>Current Address</h3>

    <div class="address-grid">
        <input type="text" id="cAddress" placeholder="Address Line">
        <input type="text" id="cCity" placeholder="City">
        <input type="text" id="cState" placeholder="State">
    </div>

</div>

<style>
.address-section{
    margin-top:20px;
}

.address-section h3{
    margin-bottom:12px;
    color:#0e0e0e;
    font-size:18px;
}

.address-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-bottom:15px;
}

.address-grid input{
    padding:13px;
    border:none;
    border-radius:12px;
    background:rgba(4, 4, 4, 0.15);
    color:rgb(9, 9, 9);
    font-size:15px;
    backdrop-filter:blur(10px);
}

.address-grid input::placeholder{
    color:#141414;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin:15px 0 20px;
    color:rgb(237, 7, 7);
    font-weight:500;
}

.checkbox input{
    width:18px;
    height:18px;
}
</style>

<script>
function copyAddress(){

    if(document.getElementById("sameAddress").checked){

        document.getElementById("cAddress").value =
        document.getElementById("pAddress").value;

        document.getElementById("cCity").value =
        document.getElementById("pCity").value;

        document.getElementById("cState").value =
        document.getElementById("pState").value;

    }else{

        document.getElementById("cAddress").value = "";
        document.getElementById("cCity").value = "";
        document.getElementById("cState").value = "";
    }
}
</script>
